name: .NET Build

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: self-hosted

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify .NET
        run: dotnet --info

      - name: Restore packages
        run: dotnet restore EmployeeManagement.sln

      - name: Build application
        run: dotnet build EmployeeManagement.sln --configuration Release

      - name: Unit Test
        run: dotnet test EmployeeManagement.sln --configuration Release

      - name: Run .NET Application
        run: dotnet run --project EmployeeManagement.csproj
