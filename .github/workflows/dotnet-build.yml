name: .NET Build

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: self-hosted
    

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore packages
      run: dotnet restore

    - name: Build application
      run: dotnet build --configuration Release
