name: Trigger Jenkins Build

on:
  push:
    branches:
      - main

jobs:
  trigger:

    runs-on: self-hosted

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Trigger Jenkins Pipeline
        run: |
          curl -X POST \
          "http://54.174.141.114:8080/job/EmployeeManagement/build" \
          --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}"
