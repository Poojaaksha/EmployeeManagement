name: Trigger Jenkins Build

on:
  push:
    branches:
      - main

jobs:
  trigger:
    runs-on: self-hosted

    steps:
      - name: Trigger Jenkins Job
        run: |
          curl -X POST \
          "${{ secrets.JENKINS_URL }}/job/EmployeeManagement/build" \
          --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}"
